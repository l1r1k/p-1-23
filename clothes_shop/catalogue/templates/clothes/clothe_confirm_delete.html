{% extends 'base.html' %}

{% block title_name %}Удаление позиции{% endblock %}

{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem;">
    <h1>Удаление позиции "{{ clothe.name }}"</h1>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Удалить</button>
    </form>
    <a href="{% url 'catalogue' %}" style="color: blue;">Вернуться назад</a>
</div>
{% endblock %}
