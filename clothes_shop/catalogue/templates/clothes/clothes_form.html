{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendWear — Интернет-магазин одежды</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <header>
        <div class="logo">TRENDWEAR</div>
        <nav>
            <ul>
                <li><a href="{% url 'index' %}">Главная</a></li>
                <li><a href="{% url 'catalogue' %}">Каталог</a></li>
                <li><a href="#">Новинки</a></li>
                <li><a href="{% url 'about' %}">О нас</a></li>
            </ul>
        </nav>
    </header>

    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem;">
        <h1>{% if form.instance.pk %}Редактирование одежды{% else %}Добавление новой одежды{% endif %}</h1>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_div }}
            <button type="submit">Сохранить</button>
        </form>
        <a href="{% url 'catalogue' %}" style="color: blue;">Вернуться назад</a>
    </div>

    <footer>
        <p>&copy; 2026 TrendWear. Все права защищены.</p>
    </footer>

</body>
</html>
